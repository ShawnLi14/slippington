# Fly.io config for the Slippington signaling server.
# Deploy: flyctl deploy   (from this folder, after flyctl auth login)
# The game then connects to wss://<app-name>.fly.dev — Fly terminates TLS
# on 443 and forwards to the internal port.

app = "slippington-signaling"
primary_region = "ewr"  # Newark — close to the US east coast

[http_service]
  internal_port = 9080
  force_https = true
  # Keep one machine always running: cold starts made the first player's
  # connection stall for ~25s (TLS handshake held during machine wake).
  # A single shared-cpu-1x 24/7 costs ~$2/mo.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
